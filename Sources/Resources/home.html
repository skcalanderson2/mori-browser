<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>New Tab</title>
  <style>
    :root {
      --bg: #f6f5f3;
      --bg-glow: #efe9e2;
      --fg: #1d1b18;
      --muted: #6c675f;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(29, 27, 24, 0.08);
      --accent: #b06b3a;
      --shadow: 0 24px 60px -28px rgba(29, 27, 24, 0.45);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16140f;
        --bg-glow: #211d15;
        --fg: #f3efe7;
        --muted: #a39c8e;
        --card: rgba(40, 36, 28, 0.6);
        --border: rgba(243, 239, 231, 0.09);
        --accent: #e0a16a;
        --shadow: 0 24px 60px -24px rgba(0, 0, 0, 0.7);
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      color: var(--fg);
      background:
        radial-gradient(900px 600px at 50% -10%, var(--bg-glow), transparent 70%),
        var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 6vh 24px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: 100%;
      max-width: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .clock {
      font-size: clamp(56px, 11vw, 92px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    form {
      width: 100%;
      position: relative;
    }
    form::before,
    form::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: 2;
    }
    form::before {
      left: 20px;
      top: 50%;
      width: 12px;
      height: 12px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-58%);
    }
    form::after {
      left: 34px;
      top: 50%;
      width: 8px;
      height: 2px;
      border-radius: 999px;
      background: var(--muted);
      transform: translateY(4px) rotate(45deg);
      transform-origin: left center;
    }
    .search {
      position: relative;
      z-index: 0;
      width: 100%;
      height: 58px;
      padding: 0 22px 0 54px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      color: var(--fg);
      font-size: 17px;
      outline: none;
      transition: border-color 0.18s ease, transform 0.18s ease;
    }
    .search::placeholder { color: var(--muted); }
    .search:focus {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    footer {
      position: fixed;
      bottom: 22px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main>
    <div class="clock" id="clock">--:--</div>

    <form id="search-form" action="https://www.google.com/search" method="get" autocomplete="off">
      <input class="search" id="search-input" name="q" type="text"
             placeholder="Search the web" aria-label="Search the web" autofocus />
    </form>
  </main>

  <footer>Mori</footer>

  <script>
    function pad(n) { return String(n).padStart(2, "0"); }

    function tick() {
      const now = new Date();
      document.getElementById("clock").textContent = pad(now.getHours()) + ":" + pad(now.getMinutes());
    }

    tick();
    setInterval(tick, 1000 * 15);
    window.addEventListener("load", () => document.getElementById("search-input").focus());
  </script>
</body>
</html>
