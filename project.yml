name: Mori
options:
  bundleIdPrefix: com.mori.browser
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CLANG_CXX_LANGUAGE_STANDARD: "c++20"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_ENABLE_OBJC_ARC: YES
    SWIFT_VERSION: "5.0"
    # Clone-friendly signing defaults. Local development uses ad-hoc signing so
    # contributors do not need the original author's Apple developer team.
    # Release distributors can override CODE_SIGN_IDENTITY and DEVELOPMENT_TEAM
    # from Xcode or xcodebuild when they are ready to notarize.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
  configs:
    # Daily driver: ad-hoc signed, hardened runtime off (simplest for V8 +
    # local Secure Enclave / Touch ID passkey testing).
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
    # Release keeps hardened runtime on. Override CODE_SIGN_IDENTITY with a
    # Developer ID Application certificate and DEVELOPMENT_TEAM to notarize.
    Release:
      ENABLE_HARDENED_RUNTIME: YES

targetTemplates:
  CEFHelper:
    type: application
    platform: macOS
    sources:
      - path: Sources/Helper
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Helper-Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/helper.entitlements
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/third_party/cef"
        PRODUCT_NAME: ${product_name}
        PRODUCT_BUNDLE_IDENTIFIER: ${bundle_id}
        OTHER_LDFLAGS:
          - "-lpthread"
          - "$(SRCROOT)/third_party/cef/build/libcef_dll_wrapper/libcef_dll_wrapper.a"
    dependencies:
      - sdk: Cocoa.framework
      - sdk: IOSurface.framework

targets:
  # ---- Helper sub-processes (5 bundles sharing one binary source) ----
  MoriHelper:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Mori Helper"
      bundle_id: "com.mori.browser.helper"

  MoriHelperGPU:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Mori Helper (GPU)"
      bundle_id: "com.mori.browser.helper.gpu"

  MoriHelperPlugin:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Mori Helper (Plugin)"
      bundle_id: "com.mori.browser.helper.plugin"

  MoriHelperRenderer:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Mori Helper (Renderer)"
      bundle_id: "com.mori.browser.helper.renderer"

  MoriHelperAlerts:
    templates: [CEFHelper]
    templateAttributes:
      product_name: "Mori Helper (Alerts)"
      bundle_id: "com.mori.browser.helper.alerts"

  # ---- Main browser application ----
  Mori:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Bridge
      - path: Sources/UI
      - path: Sources/Resources/App-Info.plist
        buildPhase: none
      - path: Sources/Resources/home.html
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: "Mori"
        PRODUCT_BUNDLE_IDENTIFIER: "com.mori.browser"
        PRODUCT_MODULE_NAME: "Mori"
        INFOPLIST_FILE: Sources/Resources/App-Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/app.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridge/Mori-Bridging-Header.h
        SWIFT_OBJC_INTERFACE_HEADER_NAME: "Mori-Swift.h"
        SWIFT_INSTALL_OBJC_HEADER: YES
        CLANG_ENABLE_MODULES: YES
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/third_party/cef"
          - "$(SRCROOT)/Sources/App"
          - "$(SRCROOT)/Sources/Bridge"
        OTHER_LDFLAGS:
          - "-lpthread"
          - "$(SRCROOT)/third_party/cef/build/libcef_dll_wrapper/libcef_dll_wrapper.a"
    dependencies:
      - sdk: Cocoa.framework
      - sdk: IOSurface.framework
      - target: MoriHelper
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: MoriHelperGPU
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: MoriHelperPlugin
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: MoriHelperRenderer
        embed: true
        codeSign: true
        copy:
          destination: frameworks
      - target: MoriHelperAlerts
        embed: true
        codeSign: true
        copy:
          destination: frameworks
    postBuildScripts:
      - script: bash "$SRCROOT/Scripts/embed_cef_framework.sh"
        name: Embed CEF Framework
